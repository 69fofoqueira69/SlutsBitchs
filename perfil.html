<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil</title>

<link rel="stylesheet" href="./css/global.css">
<link rel="stylesheet" href="./css/perfil.css">

</head>
<body>

<div class="container">

  <div class="info">

    <button
      class="voltar"
      onclick="window.location.href='index.html'"
    >
      ← Voltar
    </button>

    <div class="box">

      <h1 id="nome"></h1>

      <div class="linha">
        Título:
        <span id="titulo"></span>
      </div>

      <div class="linha">
        Idade:
        <span id="idade"></span>
      </div>

      <div class="linha">
        Número:
        <span id="sexo"></span>
      </div>

      <div id="biografia"></div>

    </div>

    <div class="botoes">

      <button
        class="botao"
        onclick="abrirGaleria()"
      >
        🖼 Galeria
      </button>

      <button
        class="botao"
        onclick="abrirRoupas()"
      >
        👗 Roupas
      </button>

    </div>

  </div>

  <div class="imagem">

    <img id="imagem">

  </div>

</div>

<script src="./js/dados.js"></script>
<script src="./js/perfil.js"></script>

</body>
</html>
